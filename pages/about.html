<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kamo G — About. Biography, stats, and story of South African music artist Kamo G.">
  <meta name="theme-color" content="#111111">

  <title>Kamo G — About</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/pages.css">
  <link rel="stylesheet" href="../css/responsive.css">

  <script src="../js/utils.js" defer></script>
  <script src="../js/main.js" defer></script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div id="navbar">Loading navigation...</div>

  <div class="app-layout">
    <div id="sidebar">Loading sidebar...</div>

    <main id="main-content" class="app-main">
      <div class="app-content">

        <!-- About Hero -->
        <div id="about-hero" class="about-hero">
          <div class="about-hero__overlay">
            <h1 class="about-hero__title">Kamo G</h1>
          </div>
        </div>

        <!-- About Content -->
        <div id="about-content" class="about-content">
          <div class="about-content__text">
            <p>Loading biography...</p>
          </div>
          <div class="about-content__image">
            <div style="width: 100%; height: 100%; min-height: 300px; background: var(--dark-mid); display: flex; align-items: center; justify-content: center; color: var(--muted);">
              Loading image...
            </div>
          </div>
        </div>

        <!-- Stats -->
        <div id="about-stats" class="about-stats">
          <div class="about-stat">
            <p style="color: var(--muted);">Loading stats...</p>
          </div>
        </div>

        <!-- CTA Strip -->
        <div class="cta-strip">
          <div>
            <h2 class="cta-strip__title">Book Kamo G</h2>
            <p class="cta-strip__subtitle">Available for festivals, events, and collaborations.</p>
          </div>
          <a href="/bookings" class="btn btn--white btn--lg">Make an Inquiry</a>
        </div>

      </div>
    </main>
  </div>

  <div id="footer">Loading footer...</div>

  <script>
    async function loadComponent(id, url) {
      try {
        const response = await fetch(url);
        if (response.ok) document.getElementById(id).innerHTML = await response.text();
      } catch (e) { console.warn('Could not load component:', url); }
    }
    loadComponent('navbar', '../components/navbar.html');
    loadComponent('sidebar', '../components/sidebar.html');
    loadComponent('footer', '../components/footer.html');
  </script>
</body>
</html>
